<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极光云盘 - Aura Drive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2.0">
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <span class="logo-accent">Aura</span>Drive
        </div>
        <div class="nav-actions">
            <button class="btn btn-secondary" id="theme-toggle">切换主题</button>
        </div>
    </header>

    <main class="container">
        <section class="drive-header">
            <div class="header-left">
                <h1 class="page-title">共享资源库</h1>
                <p class="repo-info">访客公共下载通道</p>
            </div>
            <div class="header-right">
                <div class="storage-info">
                    <span class="storage-text" id="storage-usage-text">正在加载文件...</span>
                    <div class="storage-bar">
                        <div class="storage-fill" id="storage-usage-bar" style="width: 0%;"></div>
                    </div>
                </div>
            </div>
        </section>

        <section class="files-control-bar">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="搜索文件...">
            </div>
            <div class="filter-actions">
                <button class="btn btn-secondary btn-icon active" id="filter-all">全部</button>
                <button class="btn btn-secondary btn-icon" id="filter-image">图片</button>
                <button class="btn btn-secondary btn-icon" id="filter-doc">文档</button>
                <button class="btn btn-secondary btn-icon" id="filter-other">其他</button>
            </div>
        </section>

        <section class="files-container">
            <div class="loading-state" id="loading-spinner">
                <div class="spinner"></div>
                <p>正在拉取资源列表...</p>
            </div>
            <div class="empty-state" id="empty-state" style="display: none;">
                <div class="empty-icon"></div>
                <h3>暂无共享资源</h3>
                <p>管理员尚未上传任何文件</p>
            </div>
            <div class="files-grid" id="files-grid"></div>
        </section>
    </main>

    <div class="toast-container" id="toast-container"></div>

    <footer class="footer">
        <div class="footer-bottom">
            <p>&copy; 2026 极光云盘. 极速、绿色的文件共享站点.</p>
        </div>
    </footer>

    <script src="script.js?v=2.0"></script>
</body>
</html>
