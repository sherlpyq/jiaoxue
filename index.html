<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极光云盘 - Aura Drive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <span class="logo-accent">Aura</span>Drive
        </div>
        <div class="nav-actions">
            <button class="btn btn-secondary" id="theme-toggle">切换主题</button>
            <button class="btn btn-primary" id="open-config-btn">配置仓库</button>
        </div>
    </header>

    <main class="container">
        <section class="drive-header">
            <div class="header-left">
                <h1 class="page-title">我的云盘</h1>
                <p class="repo-info" id="current-repo-display">当前关联仓库: 未配置</p>
            </div>
            <div class="header-right">
                <div class="storage-info">
                    <span class="storage-text" id="storage-usage-text">已加载 0 个文件</span>
                    <div class="storage-bar">
                        <div class="storage-fill" id="storage-usage-bar" style="width: 0%;"></div>
                    </div>
                </div>
            </div>
        </section>

        <section class="upload-area" id="drop-zone">
            <input type="file" id="file-input" multiple style="display: none;">
            <div class="upload-icon"></div>
            <h3>拖拽文件到此处，或 <span class="upload-link" id="select-files-trigger">点击浏览</span></h3>
            <p>支持多文件上传，单个文件大小建议不超过 25MB</p>
            <div id="upload-progress-container" class="upload-progress-container" style="display: none;">
                <div class="progress-info">
                    <span id="upload-status-text">正在准备上传...</span>
                    <span id="upload-percentage-text">0%</span>
                </div>
                <div class="progress-track">
                    <div class="progress-thumb" id="upload-progress-bar" style="width: 0%;"></div>
                </div>
            </div>
        </section>

        <section class="files-control-bar">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="搜索文件...">
            </div>
            <div class="filter-actions">
                <button class="btn btn-secondary btn-icon active" id="filter-all">全部</button>
                <button class="btn btn-secondary btn-icon" id="filter-image">图片</button>
                <button class="btn btn-secondary btn-icon" id="filter-doc">文档</button>
                <button class="btn btn-secondary btn-icon" id="filter-other">其他</button>
            </div>
        </section>

        <section class="files-container">
            <div class="loading-state" id="loading-spinner" style="display: none;">
                <div class="spinner"></div>
                <p>正在拉取文件列表...</p>
            </div>
            <div class="empty-state" id="empty-state">
                <div class="empty-icon"></div>
                <h3>暂无文件</h3>
                <p>请点击上方配置仓库，或直接拖入文件开始上传</p>
            </div>
            <div class="files-grid" id="files-grid"></div>
        </section>
    </main>

    <div class="modal" id="config-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>GitHub 仓库配置</h2>
                <button class="close-btn" id="close-config-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="config-username">GitHub 用户名</label>
                    <input type="text" id="config-username" placeholder="例如: sherlpyq">
                </div>
                <div class="form-group">
                    <label for="config-repo">仓库名称</label>
                    <input type="text" id="config-repo" placeholder="例如: jiaoxue">
                </div>
                <div class="form-group">
                    <label for="config-branch">分支名称</label>
                    <input type="text" id="config-branch" placeholder="默认: main" value="main">
                </div>
                <div class="form-group">
                    <label for="config-path">存储目录</label>
                    <input type="text" id="config-path" placeholder="例如: files" value="files">
                </div>
                <div class="form-group">
                    <label for="config-token">GitHub 访问令牌 (Personal Access Token)</label>
                    <input type="password" id="config-token" placeholder="输入 ghp_ 开头的口令以支持文件上传">
                    <span class="help-text">口令仅保存在本地浏览器中，绝对不会上传第三方服务器。</span>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancel-config-btn">取消</button>
                <button class="btn btn-primary" id="save-config-btn">保存配置</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <footer class="footer">
        <div class="footer-bottom">
            <p>&copy; 2026 极光云盘. 数据完全托管于您的 GitHub 仓库.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
